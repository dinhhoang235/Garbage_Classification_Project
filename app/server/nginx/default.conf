upstream backend {
    server fastapi_backend:8000;
}

upstream minio_s3 {
    server minio:9000;
}

server {
    listen 80;
    server_name _;

    # Giới hạn kích thước file upload (cho ảnh)
    client_max_body_size 50M;

    # API Backend (FastAPI)
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Hỗ trợ WebSockets (nếu sau này cần)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MinIO S3 API (cho phép lấy/lưu ảnh trực tiếp qua Nginx nếu cần)
    location /garbage-images/ {
        proxy_pass http://minio_s3/garbage-images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
